        // ==================== 主應用 ====================
        function App() {
            const [language, setLanguage] = useState('zh');
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState(mockProjects);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [currentView, setCurrentView] = useState('dashboard'); // 'dashboard' or 'project'
            const [selectedProject, setSelectedProject] = useState(null);

            const t = (key) => translations[language][key] || key;

            // 篩選邏輯
            const filteredProjects = projects.filter(project => {
                const matchSearch = project.partName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   project.partNumber.toLowerCase().includes(searchTerm.toLowerCase());
                const matchStatus = filterStatus === 'all' || project.status === filterStatus;
                return matchSearch && matchStatus;
            });

            const handleViewProject = (project) => {
                setSelectedProject(project);
                setCurrentView('project');
            };

            const handleBackToDashboard = () => {
                setCurrentView('dashboard');
                setSelectedProject(null);
            };

            if (!currentUser) {
                return <LoginPage setCurrentUser={setCurrentUser} t={t} language={language} setLanguage={setLanguage} />;
            }

            return (
                <AppContext.Provider value={{ 
                    t, language, setLanguage, currentUser, projects, setProjects,
                    selectedProject, setSelectedProject, handleViewProject, handleBackToDashboard
                }}>
                    <div className="min-h-screen bg-gray-50">
                        <Navbar setCurrentUser={setCurrentUser} />
                        <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            {currentView === 'dashboard' ? (
                                <Dashboard 
                                    filteredProjects={filteredProjects}
                                    searchTerm={searchTerm}
                                    setSearchTerm={setSearchTerm}
                                    filterStatus={filterStatus}
                                    setFilterStatus={setFilterStatus}
                                />
                            ) : (
                                <ProjectDetail />
                            )}
                        </main>
                    </div>
                </AppContext.Provider>
            );
        }

        // ==================== 進度環形圖 ====================
        function ProgressRing({ progress, size = 120 }) {
            const strokeWidth = 8;
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (progress / 100) * circumference;

            return (
                <div className="relative" style={{ width: size, height: size }}>
                    <svg className="progress-ring" width={size} height={size}>
                        {/* 背景圓環 */}
                        <circle
                            cx={size / 2}
                            cy={size / 2}
                            r={radius}
                            stroke="#e5e7eb"
                            strokeWidth={strokeWidth}
                            fill="none"
                        />
                        {/* 進度圓環 */}
                        <circle
                            cx={size / 2}
                            cy={size / 2}
                            r={radius}
                            stroke="#3b82f6"
                            strokeWidth={strokeWidth}
                            fill="none"
                            strokeDasharray={circumference}
                            strokeDashoffset={offset}
                            strokeLinecap="round"
                            style={{ transition: 'stroke-dashoffset 0.5s ease' }}
                        />
                    </svg>
                    {/* 中間文字 */}
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-3xl font-bold text-gray-800">{progress}%</span>
                        <span className="text-xs text-gray-500">完成度</span>
                    </div>
                </div>
            );
        }

        // ==================== APQP Tab (五階段追蹤) ====================
        function APQPTab({ project }) {
            const { t, currentUser } = useContext(AppContext);
            const [notification, setNotification] = useState(null);

            const apqpStages = [
                {
                    stage: 1,
                    title: t('stage1'),
                    docs: ['客戶特殊要求 (CSR)', '初步風險評估', '初步BOM'],
                    dept: 'sales',
                    approved: true,
                    completed: true,
                },
                {
                    stage: 2,
                    title: t('stage2'),
                    docs: ['可行性評估', '模具設計圖', '模具製作排程'],
                    dept: 'engineering',
                    approved: true,
                    completed: true,
                },
                {
                    stage: 3,
                    title: t('stage3'),
                    docs: ['製程流程圖 (PFD)', 'PFMEA (AIAG-VDA版)', '試產前控制計畫', 'SOP'],
                    dept: 'engineering',
                    approved: false,
                    completed: true,
                },
                {
                    stage: 4,
                    title: t('stage4'),
                    docs: ['MSA報告 (Gage R&R)', '初始製程能力 (Cpk)', 'FAI全尺寸報告'],
                    dept: 'quality',
                    approved: false,
                    completed: false,
                },
                {
                    stage: 5,
                    title: t('stage5'),
                    docs: ['量產控制計畫', '良率分析', '經驗總結 (Lessons Learned)'],
                    dept: 'quality',
                    approved: false,
                    completed: false,
                },
            ];

            const handleApprove = (stage) => {
                setNotification(`✅ ${t('approveSuccess')}: 階段 ${stage}`);
                setTimeout(() => setNotification(null), 3000);
            };

            const isLocked = (stage) => {
                if (stage === 1) return false;
                return !apqpStages[stage - 2].approved;
            };

            return (
                <div className="space-y-4">
                    {notification && (
                        <div className="bg-green-50 border-2 border-green-500 text-green-700 px-6 py-3 rounded-lg font-semibold">
                            {notification}
                        </div>
                    )}

                    {apqpStages.map((stageData, index) => {
                        const locked = isLocked(stageData.stage);
                        
                        return (
                            <div
                                key={stageData.stage}
                                className={`border-2 border-gray-200 rounded-xl p-5 ${locked ? 'opacity-50 bg-gray-50' : 'bg-white'}`}
                            >
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-white text-lg ${
                                            stageData.approved ? 'bg-green-500' : 
                                            stageData.completed ? 'bg-blue-500' : 'bg-gray-400'
                                        }`}>
                                            {stageData.stage}
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800">{stageData.title}</h3>
                                            <p className="text-sm text-gray-600">
                                                {t('responsible')}: <span className="font-semibold">{t(stageData.dept)}</span>
                                            </p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {stageData.approved ? (
                                            <span className="badge badge-completed">{t('approved')}</span>
                                        ) : stageData.completed ? (
                                            <>
                                                <span className="badge badge-inProgress">{t('underReview')}</span>
                                                {currentUser.role === 'manager' && (
                                                    <button
                                                        onClick={() => handleApprove(stageData.stage)}
                                                        className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium"
                                                    >
                                                        {t('approve')}
                                                    </button>
                                                )}
                                            </>
                                        ) : (
                                            <span className="badge badge-pending">{t('inProgress')}</span>
                                        )}
                                    </div>
                                </div>

                                {locked && (
                                    <div className="mb-4 bg-yellow-50 border border-yellow-300 rounded-lg p-3 text-sm text-yellow-800">
                                        {t('stageLocked')}
                                    </div>
                                )}

                                <div className="space-y-2">
                                    {stageData.docs.map((doc, i) => (
                                        <div
                                            key={i}
                                            className="flex items-center justify-between bg-gray-50 rounded-lg p-4 hover:bg-gray-100 transition"
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 font-bold">
                                                    {i + 1}
                                                </div>
                                                <span className="font-medium text-gray-800">{doc}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button className="text-sm text-blue-600 hover:underline">{t('viewDocument')}</button>
                                                {!locked && (
                                                    <>
                                                        <button className="text-sm text-blue-600 hover:underline">{t('edit')}</button>
                                                        <button className="text-sm text-blue-600 hover:underline">{t('upload')}</button>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ==================== Documents Tab (文件庫) ====================

                { id: 2, name: 'MSA_Report.xlsx', type: 'Excel', size: '1.8 MB', uploadDate: '2024-05-10', uploadBy: 'qa_user' },

                <div className="space-y-6">

                    <FileUploadZone label={t('uploadFile')} />

                        <h3 className="text-lg font-bold mb-4">已上傳文件 ({mockDocuments.length})</h3>
                        <div className="space-y-3">

                            ))}

        // ==================== 檔案上傳區 ====================
        function FileUploadZone({ label }) {
            const { t } = useContext(AppContext);
            const [dragActive, setDragActive] = useState(false);

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === "dragenter" || e.type === "dragover") {
                    setDragActive(true);
                } else if (e.type === "dragleave") {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    alert(`${t('uploadSuccess')}: ${e.dataTransfer.files[0].name}`);
                }
            };

            const handleChange = (e) => {
                e.preventDefault();
                if (e.target.files && e.target.files[0]) {
                    alert(`${t('uploadSuccess')}: ${e.target.files[0].name}`);
                }
            };

            return (
                <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">{label}</label>
                    <div
                        className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition ${
                            dragActive ? 'border-blue-500 bg-blue-50' : 'border-gray-300 bg-gray-50 hover:border-blue-400'
                        }`}
                        onDragEnter={handleDrag}
                        onDragLeave={handleDrag}
                        onDragOver={handleDrag}
                        onDrop={handleDrop}
                    >
                        <input
                            type="file"
                            accept=".jpg,.jpeg,.png,.pdf"
                            onChange={handleChange}
                            className="hidden"
                            id={`file-upload-${label}`}
                        />
                        <label htmlFor={`file-upload-${label}`} className="cursor-pointer">
                            <div className="text-gray-600">
                                <div className="text-5xl mb-3">📁</div>
                                <div className="font-semibold text-lg mb-1">{t('dragDropHint')}</div>
                                <div className="text-sm text-gray-500">{t('supportedFormats')}</div>
                            </div>
                        </label>
                    </div>
                </div>
            );
        }

        // ==================== 啟動應用 ====================
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
